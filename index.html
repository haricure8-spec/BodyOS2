<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UG LAB</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
  <div class="hero"><h1>UG LAB</h1><p>答えは身体にある。</p></div>

  <section class="panel no-print">
    <h2>患者情報</h2>
    <div class="grid">
      <div><label>患者名</label><input id="patientName" placeholder="氏名を入力"></div>
      <div><label>診療日</label><input id="visitDate" type="date"></div>
      <div><label>主訴</label><input id="chiefComplaint" placeholder="例：首肩こり・頭痛"></div>
    </div>
    <div class="grid">
      <div><label>年</label><input id="year" type="number" placeholder="西暦"></div>
      <div><label>月</label><select id="month"><option value="">月</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option></select></div>
      <div><label>日</label><select id="day"><option value="">日</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option><option value="24">24</option><option value="25">25</option><option value="26">26</option><option value="27">27</option><option value="28">28</option><option value="29">29</option><option value="30">30</option><option value="31">31</option></select></div>
    </div>
    <div class="grid">
      <div><label>時</label><select id="hour"><option value="">不明</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option></select></div>
      <div><label>分</label><select id="minute"><option value="">不明</option><option value="0">00</option><option value="1">01</option><option value="2">02</option><option value="3">03</option><option value="4">04</option><option value="5">05</option><option value="6">06</option><option value="7">07</option><option value="8">08</option><option value="9">09</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option><option value="24">24</option><option value="25">25</option><option value="26">26</option><option value="27">27</option><option value="28">28</option><option value="29">29</option><option value="30">30</option><option value="31">31</option><option value="32">32</option><option value="33">33</option><option value="34">34</option><option value="35">35</option><option value="36">36</option><option value="37">37</option><option value="38">38</option><option value="39">39</option><option value="40">40</option><option value="41">41</option><option value="42">42</option><option value="43">43</option><option value="44">44</option><option value="45">45</option><option value="46">46</option><option value="47">47</option><option value="48">48</option><option value="49">49</option><option value="50">50</option><option value="51">51</option><option value="52">52</option><option value="53">53</option><option value="54">54</option><option value="55">55</option><option value="56">56</option><option value="57">57</option><option value="58">58</option><option value="59">59</option></select></div>
      <div><label>性別</label><select id="gender"><option value="">選択</option><option>女</option><option>男</option><option>不明</option></select></div>
    </div>
    <button class="green" onclick="App.calc()">命式作成</button>
  </section>

  <section id="analysis" class="card no-print"><p class="small">生年月日を入力して命式を作成してください。</p></section>

  <section class="panel no-print">
    <h2>施術前テスト</h2>
    <div class="ug6-grid"><div class="ug6-card"><label><input type="checkbox" class="beforeTest" value="①">①止まれない</label></div><div class="ug6-card"><label><input type="checkbox" class="beforeTest" value="②">②上に浮く</label></div><div class="ug6-card"><label><input type="checkbox" class="beforeTest" value="③">③外に漏れる</label></div><div class="ug6-card"><label><input type="checkbox" class="beforeTest" value="④">④時間が合わない</label></div><div class="ug6-card"><label><input type="checkbox" class="beforeTest" value="⑤">⑤頭に集まる</label></div><div class="ug6-card"><label><input type="checkbox" class="beforeTest" value="⑥">⑥受け取れない</label></div></div>
    <button class="green" onclick="App.beforeJudge()">施術前判定</button>
    <div id="beforeResult" class="small"></div>
  </section>

  <section class="panel no-print">
    <h2>施術後テスト</h2>
    <div class="ug6-grid"><div class="ug6-card"><label><input type="checkbox" class="afterTest" value="①">①止まれない</label></div><div class="ug6-card"><label><input type="checkbox" class="afterTest" value="②">②上に浮く</label></div><div class="ug6-card"><label><input type="checkbox" class="afterTest" value="③">③外に漏れる</label></div><div class="ug6-card"><label><input type="checkbox" class="afterTest" value="④">④時間が合わない</label></div><div class="ug6-card"><label><input type="checkbox" class="afterTest" value="⑤">⑤頭に集まる</label></div><div class="ug6-card"><label><input type="checkbox" class="afterTest" value="⑥">⑥受け取れない</label></div></div>
    <button class="green" onclick="App.afterJudge()">施術後判定</button>
    <div id="afterResult" class="small"></div>
  </section>

  <section class="panel no-print">
    <h2>研究モード</h2>
    <label class="switch-row"><input id="researchMode" type="checkbox" onchange="Records.toggleResearchMode()"><span>研究データとして残す時だけON</span></label>
    <p class="small">通常診療ではOFFのままで使えます。保存したい症例だけONにしてください。</p>
  </section>

  <section class="panel no-print">
    <h2>記録と出力</h2>
    <div class="grid">
      <div><label>施術メモ</label><input id="treatmentMemo" placeholder="UG判定から自動入力されます。必要なら修正"></div>
      <div><label>セルフケア</label><input id="homeCare" placeholder="UG判定から自動入力されます。必要なら修正"></div>
      <div><label>次回確認</label><input id="nextCheck" placeholder="UG判定から自動入力されます。必要なら修正"></div>
    </div>
    <button class="green" onclick="App.autoCare()">UGから自動入力</button>
    <div id="autoCare" class="autocare-box"></div>

    <div id="researchOnly" class="research-only hidden">
      <div class="grid">
        <div><label>予後評価</label><select id="outcome"><option value="">未評価</option><option value="著明改善">著明改善</option><option value="改善">改善</option><option value="やや改善">やや改善</option><option value="変化なし">変化なし</option><option value="悪化">悪化</option></select></div>
        <div><label>研究ID</label><input id="researchId" placeholder="保存時に自動採番" readonly></div>
        <div><label>データ品質</label><div id="qualityStatus" class="quality-status">未チェック</div></div>
      </div>
      <div class="grid2">
        <button class="green" onclick="Records.save()">研究データとして保存</button>
        <button onclick="Records.checkQuality()">保存チェック</button>
      </div>
      <details class="record-panel">
        <summary>研究データ管理</summary>
        <div class="grid2">
          <button onclick="Records.exportJSON()">JSON出力</button>
          <button onclick="Records.exportCSV()">CSV出力</button>
        </div>
        <div class="grid2 danger-row">
          <button class="danger" onclick="Records.deleteCurrentPatient()">この患者の研究データを削除</button>
          <button class="danger" onclick="Records.deleteAllData()">全研究データを削除</button>
        </div>
        <div id="recordStatus" class="small"></div>
        <pre id="recordPreview"></pre>
      </details>
    </div>

    <div class="grid2">
      <button onclick="Reports.chart()">カルテ作成</button>
      <button onclick="Reports.patient()">患者レポート作成</button>
    </div>
  </section>

  <section id="chartReport" class="hidden"></section>
  <section id="patientReport" class="hidden"></section>
</div>

<script src="data/solarTerms.js"></script>
<script src="data/ugdb.js"></script>
<script src="js/calendar.js"></script>
<script src="js/bodyos.js"></script>
<script src="js/reports.js"></script>
<script src="js/records.js"></script>
<script src="js/app.js"></script>
</body>
</html>
